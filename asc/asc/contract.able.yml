# This is a meta file (it defines rules for any child *.contract.able entity).
contract:
  # This allows whitelists and blacklists (on/off *.able.yml) entity in rules.
  operation:
    include: '*'
    wrap: '*'
    field: '*'
    triple: '*'
    link: '*'
    synonym: '*'
    nest: '*'
    override: '*'
    contract: '*'
    rule: '*'
    entity: '*'
    sidecar: '*'
    health: '*'
    heartbeat: '*'
    loop: '*'
    thread: '*'
    log: '*'
    cognition: '*'
    access: '*'

  # This allows to enforce which things are mandatory.
  required:
    field:
      is:
        validate:
    action:
      rule: at_least[ 1 ].of[ $subject/$operation.able.yml[ $action ]]

  # And / or optional things.
  optional:
    fields:
      - includes
      - depends
