includes:
  front:
    docroot: /var/www/html
    logs:
      front: /var/log/apache2
  api:
    docroot: /var/www/api
    logs:
      front: /var/log/api
  auth:
    docroot: /opt/keycloak
  index:
    docroot: /opt/search

dev:
  site:
    includes: front
    host: dev.specimen.home.arpa
    domain: www.dev.specimen.home.arpa
  api:
    includes: api
    host: dev.specimen.home.arpa
    domain: api.dev.specimen.home.arpa
  auth:
    includes: auth
    host: dev.specimen.home.arpa
    domain: auth.dev.specimen.home.arpa
  search:
    includes: index
    host: dev.specimen.home.arpa
    domain: search.dev.specimen.home.arpa

staging:
  site:
    includes: front
    host: staging.specimen.home.arpa
    domain: www.staging.specimen.home.arpa
  api:
    includes: api
    host: staging.specimen.home.arpa
    domain: api.staging.specimen.home.arpa
  auth:
    includes: auth
    host: staging.specimen.home.arpa
    domain: auth.staging.specimen.home.arpa
  search:
    includes: index
    host: staging.specimen.home.arpa
    domain: search.staging.specimen.home.arpa

prod:
  site:
    includes: front
    host: prod.specimen.home.arpa
    domain: www.prod.specimen.home.arpa
  api:
    includes: api
    host: prod.specimen.home.arpa
    domain: api.prod.specimen.home.arpa
  auth:
    includes: auth
    host: prod.specimen.home.arpa
    domain: auth.prod.specimen.home.arpa
  search:
    includes: index
    host: prod.specimen.home.arpa
    domain: search.prod.specimen.home.arpa
